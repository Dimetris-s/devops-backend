name: Notify

on:
  workflow_call:
    inputs:
      deploy_result:
        required: true
        type: string
      build_result:
        required: true
        type: string
      checks_result:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify via Telegram
        run: |
          CHECKS="${{ inputs.checks_result }}"
          DEPLOY="${{ inputs.deploy_result }}"
          BUILD="${{ inputs.build_result }}"

          if [ "$CHECKS" != "success" ]; then
            TEXT="❌ Тесты упали%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} | author: ${{ github.actor }}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ Деплой упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} | author: ${{ github.actor }}"
          elif [ "$BUILD" != "success" ]; then
            TEXT="❌ Билд упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} | author: ${{ github.actor }}"
          else
            TEXT="✅ Деплой успешен%0A${{ github.repository }} @ ${{ github.ref_name }} | author: ${{ github.actor }}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT"
